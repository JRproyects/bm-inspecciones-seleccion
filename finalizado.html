<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM Inspecciones - Cuestionario Completado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #8b0000 0%, #000000 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .success-card {
            background: white;
            border-radius: 15px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-top: 5px solid #ff0000;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #8b0000;
            color: white;
            font-size: 40px;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 30px;
            border: 3px solid #ff0000;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        p {
            color: #666;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .info-box {
            background: #f9f9f9;
            border-left: 4px solid #ff0000;
            padding: 20px;
            margin: 30px 0;
            text-align: left;
            border-radius: 5px;
        }

        .info-box p {
            margin: 5px 0;
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #8b0000 0%, #000000 100%);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h1>¡Cuestionario Completado!</h1>
            <p>Gracias por participar en el proceso de selección de BM Inspecciones.</p>
            
            <div class="info-box" id="candidateSummary">
                <!-- Se llenará con JS -->
            </div>

            <p>Hemos recibido tus respuestas correctamente. El equipo de RRHH se contactará con los candidatos preseleccionados.</p>
            
            <a href="index.html" class="btn">Volver al Inicio</a>
        </div>
    </div>

    <script>
        const candidato = JSON.parse(sessionStorage.getItem('candidato'));
        if (candidato) {
            document.getElementById('candidateSummary').innerHTML = `
                <p><strong>Nombre:</strong> ${candidato.nombre}</p>
                <p><strong>DNI:</strong> ${candidato.dni}</p>
                <p><strong>Email:</strong> ${candidato.email}</p>
                <p><strong>CV:</strong> ${candidato.cv}</p>
            `;
        }
    </script>
</body>
</html>
